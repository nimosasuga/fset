<script>
  let html5QrCode;
  let globalTipeScan = "";
  let currentUser = {};
  let globalDataPendapatan = {};
  let globalDataArsip = {};
  let globalAdminLogData = [];
  let globalAdminTarifData = [];
  let globalUserLogData = [];
  let globalAdminDataKaryawan = [];
  let globalAdminArsipLogData = {};
  let globalUserArsipLogData = {};
  let globalSaranST = {};

  document.addEventListener("DOMContentLoaded", function () {
    google.script.run
      .withSuccessHandler((res) => {
        const select = document.getElementById("selectKendaraan");
        select.innerHTML = '<option value="" selected disabled>Pilih Kendaraan Dinas...</option>';
        res.forEach((item) => {
          select.innerHTML += `<option value="${item.plat}|${item.jenis}">${item.plat} - ${item.jenis}</option>`;
        });
      })
      .getListKendaraan();

    const sesiTersimpan = localStorage.getItem("fset_user_session");
    if (sesiTersimpan) {
      const kredensial = JSON.parse(sesiTersimpan);
      document.getElementById("loginNrpp").value = kredensial.nrpp;
      document.getElementById("loginPass").value = kredensial.pass;
      prosesLogin(true);
    }
    document.querySelectorAll(".btn").forEach((btn) => {
      btn.classList.add("scale-tap");
    });

    // 🔥 Auto trigger suggestion saat klik input
    const inputST = document.getElementById("inputST");
    if (inputST) {
      inputST.addEventListener("focus", () => {
        inputST.dispatchEvent(new Event("input"));
      });
    }
  });

  function prosesLogin(isAutoLogin = false) {
    const nrpp = document.getElementById("loginNrpp").value;
    const pass = document.getElementById("loginPass").value;
    if (!nrpp || !pass) return Swal.fire("Oops!", "NRPP dan Password wajib diisi.", "warning");

    document.getElementById("btnLogin").innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ' + (isAutoLogin ? "Memulihkan Sesi..." : "Memvalidasi...");
    document.getElementById("btnLogin").disabled = true;
    document.getElementById("loginNrpp").disabled = true;
    document.getElementById("loginPass").disabled = true;

    google.script.run
      .withSuccessHandler(function (res) {
        document.getElementById("btnLogin").innerHTML = "Masuk Aplikasi";
        document.getElementById("btnLogin").disabled = false;
        document.getElementById("loginNrpp").disabled = false;
        document.getElementById("loginPass").disabled = false;

        if (res.success) {
          localStorage.setItem("fset_user_session", JSON.stringify({ nrpp: nrpp, pass: pass }));
          currentUser = res.data;
          document.getElementById("loginPass").value = "";
          setupDashboard();
        } else {
          localStorage.removeItem("fset_user_session");
          Swal.fire("Gagal Login", res.pesan, "error");
        }
      })
      .prosesLogin(nrpp, pass);
  }

  function navigasi(halaman) {
    const sidebarEl = document.getElementById("sidebarMenu");
    const offcanvasIns = bootstrap.Offcanvas.getInstance(sidebarEl);
    if (offcanvasIns) {
      offcanvasIns.hide();
    }

    document.getElementById("sectionBeranda").style.display = "none";
    document.getElementById("sectionRiwayat").style.display = "none";
    document.getElementById("sectionPendapatan").style.display = "none";
    document.getElementById("sectionArsip").style.display = "none";
    document.getElementById("sectionAdmin").style.display = "none";
    document.getElementById("sectionKelolaKaryawan").style.display = "none";
    document.getElementById("sectionArsipAdmin").style.display = "none";
    document.getElementById("sectionAdminGA").style.display = "none";
    document.getElementById("sectionScanner").style.display = "none";

    document.getElementById("pageDashboard").style.display = "block";
    document.getElementById("bannerStatusUser").style.display = "block";

    if (halaman === "beranda") {
      document.getElementById("sectionBeranda").style.display = "block";
    } else if (halaman === "riwayat") {
      document.getElementById("sectionRiwayat").style.display = "block";
      loadRiwayat();
    } else if (halaman === "pendapatan") {
      document.getElementById("sectionPendapatan").style.display = "block";
      loadPendapatan();
    } else if (halaman === "arsip") {
      document.getElementById("sectionArsip").style.display = "block";
      loadArsip();
    } else if (halaman === "admin") {
      document.getElementById("sectionAdmin").style.display = "block";
      document.getElementById("bannerStatusUser").style.display = "none";
      loadAdminDashboard();
    } else if (halaman === "karyawan") {
      document.getElementById("sectionKelolaKaryawan").style.display = "block";
      document.getElementById("bannerStatusUser").style.display = "none";
      loadAdminKaryawan();
    } else if (halaman === "arsipAdmin") {
      document.getElementById("sectionArsipAdmin").style.display = "block";
      document.getElementById("bannerStatusUser").style.display = "none";
      loadAdminArsipDashboard();
    } else if (halaman === "adminGA") {
      document.getElementById("sectionAdminGA").style.display = "block";
      document.getElementById("bannerStatusUser").style.display = "none";
      loadAdminGADashboard();
    }
  }

  function logout() {
    const sidebarEl = document.getElementById("sidebarMenu");
    const offcanvasIns = bootstrap.Offcanvas.getInstance(sidebarEl);
    if (offcanvasIns) {
      offcanvasIns.hide();
    }

    localStorage.removeItem("fset_user_session");
    currentUser = {};
    document.getElementById("loginNrpp").value = "";
    document.getElementById("loginPass").value = "";

    document.getElementById("pageDashboard").style.display = "none";
    document.getElementById("sectionScanner").style.display = "none";
    document.getElementById("btnSidebar").style.display = "none";
    document.getElementById("headerSpacer").style.display = "block";

    document.getElementById("pageLogin").style.display = "flex";
    Swal.fire({ title: "Logout Sukses", icon: "success", timer: 1500, showConfirmButton: false });
  }

  function setupDashboard() {
    document.getElementById("pageLogin").style.display = "none";
    document.getElementById("btnSidebar").style.display = "block";
    document.getElementById("headerSpacer").style.display = "none";

    document.getElementById("sideNama").innerText = currentUser.nama;
    document.getElementById("sideNRPP").innerText = currentUser.nrpp;
    document.getElementById("dashJabatan").innerText = currentUser.jabatan;

    const role = String(currentUser.jabatan).toUpperCase();

    const isHRD = role.includes("HRD") || role.includes("FINANCE") || role.includes("MANAGER") || role.includes("ADMIN");
    const isGA = role.includes("GA") || role.includes("ADMIN");

    if (isHRD) {
      document.getElementById("menuAdminHRD").style.display = "block";
    } else {
      document.getElementById("menuAdminHRD").style.display = "none";
    }

    if (isGA) {
      document.getElementById("menuAdminGA").style.display = "block";
    } else {
      document.getElementById("menuAdminGA").style.display = "none";
    }

    const statusBadge = document.getElementById("dashStatus");
    if (currentUser.status_trip === "OUT") {
      statusBadge.className = "status-badge bg-dinas";
      statusBadge.innerHTML = '<i class="fa-solid fa-truck-fast"></i> Dinas Luar';
      document.getElementById("formMasuk").style.display = "block";
      document.getElementById("formKeluar").style.display = "none";
    } else {
      statusBadge.className = "status-badge bg-standby";
      statusBadge.innerHTML = '<i class="fa-solid fa-building"></i> Standby';
      document.getElementById("formKeluar").style.display = "block";
      document.getElementById("formMasuk").style.display = "none";
      loadSaranAutofill();
    }

    if (isHRD) {
      navigasi("admin");
    } else if (isGA) {
      navigasi("adminGA");
    } else {
      navigasi("beranda");
    }
  }

  function loadSaranAutofill() {
    google.script.run
      .withSuccessHandler(function (data) {
        globalSaranST = {};

        let datalistHTML = "";

        data.forEach((row) => {
          let st = String(row.st).trim();

          if (!st || st === "TANPA-ST") return;

          if (!globalSaranST[st]) {
            globalSaranST[st] = {
              customer: row.customer,
              lokasi: row.lokasi,
              count: 1,
            };
          } else {
            globalSaranST[st].count++;
          }
        });

        // 🔥 SORT BERDASARKAN FREKUENSI (AI ringan)
        const sortedST = Object.keys(globalSaranST).sort((a, b) => globalSaranST[b].count - globalSaranST[a].count);

        sortedST.forEach((st) => {
          datalistHTML += `<option value="${st}">`;
        });

        document.getElementById("datalistST").innerHTML = datalistHTML;
      })
      .getRiwayatUser(currentUser.nrpp);
  }

  function autofillST() {
    const stTeks = document.getElementById("inputST").value.trim();

    if (!stTeks) return;

    // Exact match
    if (globalSaranST[stTeks]) {
      isiFormST(globalSaranST[stTeks]);
      return;
    }

    // 🔥 AI ringan: partial match
    const kandidat = Object.keys(globalSaranST).find((st) => st.includes(stTeks));

    if (kandidat) {
      isiFormST(globalSaranST[kandidat]);
    }
  }

  function isiFormST(data) {
    if (!data) return;

    document.getElementById("inputCustomer").value = data.customer;
    document.getElementById("inputLokasi").value = data.lokasi;
  }

  function bukaFormDinas() {
    document.getElementById("menuPilihanBeranda").style.display = "none";
    document.getElementById("containerFormDinas").style.display = "block";
    document.getElementById("containerMenuKendaraan").style.display = "none"; // Ditambahkan
    document.getElementById("formIzinKendaraan").style.display = "none";
    document.getElementById("riwayatIzinKendaraan").style.display = "none"; // Ditambahkan
  }

  // Hanya menampilkan menu Sub-Card, tidak memuat data yang berat dulu
  function bukaFormKendaraan() {
    document.getElementById("menuPilihanBeranda").style.display = "none";
    document.getElementById("containerFormDinas").style.display = "none";
    document.getElementById("containerMenuKendaraan").style.display = "block";
    document.getElementById("formIzinKendaraan").style.display = "none";
    document.getElementById("riwayatIzinKendaraan").style.display = "none";
  }

  // FUNGSI UPDATE: Buka Form Izin & Muat Datalist Fleet
  function bukaFormInputGA() {
    document.getElementById("containerMenuKendaraan").style.display = "none";
    document.getElementById("formIzinKendaraan").style.display = "block";

    document.getElementById("lblPemohonNama").innerText = currentUser.nama;
    document.getElementById("searchPartner").value = "";

    // 1. Muat Daftar Kendaraan
    google.script.run
      .withSuccessHandler((res) => {
        const select = document.getElementById("selectKendaraanGA");
        select.innerHTML = '<option value="" selected disabled>Pilih Kendaraan...</option>';
        res.forEach((item) => {
          select.innerHTML += `<option value="${item.plat}">${item.plat} - ${item.jenis}</option>`;
        });
        select.innerHTML += `<option value="OTHER" class="fw-bold text-primary">+ Pilihan Lain (Ketik Manual)</option>`;
      })
      .getListKendaraan();

    // 2. Muat Daftar Karyawan / Partner
    google.script.run
      .withSuccessHandler(function (list) {
        let html = "";
        let isMekanik = String(currentUser.jabatan).toUpperCase().includes("MEKANIK");

        list.forEach((k) => {
          let tampilkan = true;
          if (isMekanik) {
            tampilkan = String(k.jabatan).toUpperCase().includes("MEKANIK");
          }

          if (k.nrpp !== currentUser.nrpp && tampilkan) {
            html += `<div class="form-check mb-2 item-partner border-bottom pb-1">
                     <input class="form-check-input chk-partner shadow-sm" type="checkbox" value="${k.nama}" id="chk_${k.nrpp}">
                     <label class="form-check-label text-dark label-partner fw-medium" for="chk_${k.nrpp}" style="font-size: 0.85rem; cursor:pointer;">
                        ${k.nama} 
                        <span class="text-muted small d-block" style="font-size: 0.7rem;">${k.jabatan}</span>
                     </label>
                   </div>`;
          }
        });
        if (html === "") html = '<div class="text-center py-3 small text-muted">Tidak ada partner.</div>';
        document.getElementById("containerCheckboxesPartner").innerHTML = html;
      })
      .getListKaryawan();

    // 3. MUAT DAFTAR KARTU FLEET (DATALIST)
    google.script.run
      .withSuccessHandler(function (list) {
        let html = "";
        list.forEach((fleet) => {
          html += `<option value="${fleet}">`;
        });
        document.getElementById("datalistFleet").innerHTML = html;
      })
      .getListFleet();
  }

  // FUNGSI BARU: Buka Riwayat Khusus
  function bukaRiwayatGA() {
    document.getElementById("containerMenuKendaraan").style.display = "none";
    document.getElementById("riwayatIzinKendaraan").style.display = "block";
    loadRiwayatKendaraanUser(); // Panggil data riwayat hanya saat kartu ini diklik
  }

  // FUNGSI BARU: Tombol Kembali ke Sub-Menu
  function kembaliKeMenuKendaraan() {
    document.getElementById("containerMenuKendaraan").style.display = "block";
    document.getElementById("formIzinKendaraan").style.display = "none";
    document.getElementById("riwayatIzinKendaraan").style.display = "none";
  }

  function filterPartner() {
    let input = document.getElementById("searchPartner").value.toUpperCase();
    let items = document.querySelectorAll(".item-partner");

    items.forEach(function (item) {
      let label = item.querySelector(".label-partner").innerText.toUpperCase();
      if (label.indexOf(input) > -1) {
        item.style.display = "";
      } else {
        item.style.display = "none";
      }
    });
  }

  // PERBAIKAN: Tombol Kembali ke Beranda Utama
  function kembaliKeMenuBeranda() {
    document.getElementById("menuPilihanBeranda").style.display = "flex";
    document.getElementById("containerFormDinas").style.display = "none";
    document.getElementById("containerMenuKendaraan").style.display = "none";
    document.getElementById("formIzinKendaraan").style.display = "none";
    document.getElementById("riwayatIzinKendaraan").style.display = "none";
  }

  function cekKendaraanLainnya() {
    const val = document.getElementById("selectKendaraanGA").value;
    if (val === "OTHER") {
      document.getElementById("inputKendaraanLainnya").style.display = "block";
      document.getElementById("inputKendaraanLainnya").focus();
    } else {
      document.getElementById("inputKendaraanLainnya").style.display = "none";
      document.getElementById("inputKendaraanLainnya").value = "";
    }
  }

  // FUNGSI UPDATE: Validasi Super Ketat (Semua Wajib Kecuali Partner)
  function submitIzinKendaraan() {
    // 1. Ambil semua nilai dari form
    let plat = document.getElementById("selectKendaraanGA").value;
    if (plat === "OTHER") plat = document.getElementById("inputKendaraanLainnya").value.trim();

    const customer = document.getElementById("inputGACustomer").value.trim();
    const alamat = document.getElementById("inputGAAlamat").value.trim();
    const departemen = document.getElementById("inputGADepartemen").value.trim();
    const kmAwal = document.getElementById("inputGAKm").value.trim();
    const kartuFleet = document.getElementById("inputGAFleet").value.trim();

    // 2. KUNCI VALIDASI: Cek apakah ada yang kosong
    if (!plat || !customer || !alamat || !departemen || !kmAwal || !kartuFleet) {
      return Swal.fire({
        icon: "warning",
        title: "Data Belum Lengkap",
        text: "Mohon lengkapi semua kolom yang bertanda bintang merah (*). Kolom Partner Kerja bersifat opsional.",
        confirmButtonColor: "#e11d48",
      });
    }

    // 3. Tarik data Partner (Opsional)
    let partnerTerpilih = [];
    document.querySelectorAll(".chk-partner:checked").forEach((chk) => {
      partnerTerpilih.push(chk.value);
    });

    const payloadData = {
      nrpp: currentUser.nrpp,
      nama: currentUser.nama,
      plat: plat.toUpperCase(),
      partner: partnerTerpilih,
      customer: customer.toUpperCase(),
      alamat: alamat,
      departemen: departemen.toUpperCase(),
      km_awal: kmAwal,
      kartu_fleet: kartuFleet,
    };

    // 4. Ubah tombol jadi loading
    document.getElementById("btnSubmitGA").innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Mengirim...';
    document.getElementById("btnSubmitGA").disabled = true;

    // 5. Kirim ke Backend
    google.script.run
      .withSuccessHandler(function (res) {
        document.getElementById("btnSubmitGA").innerHTML = '<i class="fa-solid fa-paper-plane me-2"></i> Ajukan Izin ke GA';
        document.getElementById("btnSubmitGA").disabled = false;

        if (res.success) {
          Swal.fire("Berhasil Terkirim!", res.pesan, "success").then(() => {
            // Reset form setelah sukses
            document.getElementById("inputGACustomer").value = "";
            document.getElementById("inputGAAlamat").value = "";
            document.getElementById("inputGAKm").value = "";
            document.getElementById("inputGAFleet").value = "";
            document.getElementById("searchPartner").value = "";
            document.querySelectorAll(".chk-partner:checked").forEach((c) => (c.checked = false));
            filterPartner();
            kembaliKeMenuKendaraan();
          });
        } else {
          Swal.fire("Gagal!", res.pesan, "error");
        }
      })
      .simpanIzinKendaraan(payloadData);
  }

  // =======================================================================
  // FUNGSI 1: Menampilkan Tabel Riwayat Kendaraan User (+ Menampilkan KM Akhir)
  // =======================================================================
  function loadRiwayatKendaraanUser() {
    document.getElementById("tableRiwayatKendaraanUser").innerHTML = '<tr><td colspan="7" class="text-center py-4"><i class="fa-solid fa-spinner fa-spin text-primary"></i></td></tr>';

    google.script.run
      .withSuccessHandler(function (res) {
        let html = "";
        if (res.length === 0) {
          html = '<tr><td colspan="7" class="text-center py-4 text-muted">Belum ada riwayat pengajuan.</td></tr>';
        } else {
          res.forEach((item) => {
            // Menentukan warna status
            let badgeStatus = "";
            if (item.status === "PENDING") badgeStatus = `<span class="badge bg-warning text-dark">PENDING</span>`;
            else if (item.status === "APPROVED") badgeStatus = `<span class="badge bg-success">APPROVED</span>`;
            else if (item.status === "REJECTED") badgeStatus = `<span class="badge bg-danger">REJECTED</span>`;
            else badgeStatus = `<span class="badge bg-secondary">${item.status}</span>`;

            // Logika Tombol "Isi Biaya"
            let btnBiaya = "";
            // Jika biaya sudah lebih dari 0 ATAU user sudah mengisi KM Akhir, tombol berubah hijau
            if (item.totalBiaya > 0 || item.kmAkhir) {
              btnBiaya = `<button class="btn btn-sm btn-light border text-success fw-bold shadow-sm" onclick="bukaModalPengeluaran('${item.id}', ${item.bbm}, ${item.tol}, ${item.parkir}, ${item.lain}, '${item.kmAkhir}')"><i class="fa-solid fa-money-bill-wave me-1"></i> Rp ${item.totalBiaya.toLocaleString("id-ID")}</button>`;
            } else {
              btnBiaya = `<button class="btn btn-sm btn-outline-primary fw-bold shadow-sm" onclick="bukaModalPengeluaran('${item.id}', 0, 0, 0, 0, '')"><i class="fa-solid fa-plus me-1"></i> Isi Biaya & KM</button>`;
            }

            // Teks KM untuk ditampilkan di tabel (Jika KM Akhir ada, tampilkan. Jika tidak, tampilkan "Belum Input")
            let teksKmAkhir = item.kmAkhir ? item.kmAkhir : "Belum Input";

            html += `<tr>
            <td><small>${item.waktu}</small></td>
            <td>
              <strong class="text-dark">${item.plat}</strong><br>
              <small class="text-muted">KM: ${item.km} ➔ ${teksKmAkhir}<br>Fleet: ${item.fleet}</small>
            </td>
            <td class="text-start" style="max-width: 140px; white-space: normal;"><small>${item.partner}</small></td>
            <td class="text-start">
              <strong class="text-dark">${item.customer}</strong><br>
              <small class="text-muted d-inline-block text-truncate" style="max-width: 150px;" title="${item.alamat}">${item.alamat}</small>
            </td>
            <td><small>${item.departemen}</small></td>
            <td>${badgeStatus}</td>
            <td>${btnBiaya}</td>
          </tr>`;
          });
        }
        document.getElementById("tableRiwayatKendaraanUser").innerHTML = html;
      })
      .getRiwayatIzinKendaraanUser(currentUser.nrpp);
  }

  // =======================================================================
  // FUNGSI 2: Modal Input Pengeluaran dari User (+ Input KM Akhir)
  // =======================================================================
  function bukaModalPengeluaran(idIzin, bbmVal, tolVal, parkirVal, lainVal, kmAkhirVal) {
    Swal.fire({
      title: "Input Pengeluaran & KM",
      html: `
        <div class="text-start mt-3">
          <div class="alert bg-light border py-2 small mb-3 text-muted">
            <i class="fa-solid fa-circle-info text-primary me-1"></i> 
            Wajib laporkan <strong>KM Akhir</strong> kendaraan saat Anda kembali.
          </div>
          
          <!-- FIELD BARU: KM AKHIR -->
          <label class="form-label small fw-bold mb-1 text-primary">KM Akhir Kendaraan <span class="text-danger">*</span></label>
          <div class="input-group mb-3 shadow-sm">
            <span class="input-group-text bg-white"><i class="fa-solid fa-gauge-high text-primary"></i></span>
            <input type="number" id="input-km-akhir" class="form-control fw-bold border-start-0" value="${kmAkhirVal || ""}" placeholder="Contoh: 45050" required>
          </div>

          <label class="form-label small fw-bold mb-1 text-dark">Biaya BBM</label>
          <div class="input-group mb-2">
            <span class="input-group-text bg-light">Rp</span>
            <input type="number" id="input-bbm" class="form-control" value="${bbmVal || ""}" placeholder="0">
          </div>

          <label class="form-label small fw-bold mb-1 text-dark">Biaya Tol</label>
          <div class="input-group mb-2">
            <span class="input-group-text bg-light">Rp</span>
            <input type="number" id="input-tol" class="form-control" value="${tolVal || ""}" placeholder="0">
          </div>

          <label class="form-label small fw-bold mb-1 text-dark">Biaya Parkir</label>
          <div class="input-group mb-2">
            <span class="input-group-text bg-light">Rp</span>
            <input type="number" id="input-parkir" class="form-control" value="${parkirVal || ""}" placeholder="0">
          </div>

          <label class="form-label small fw-bold mb-1 text-dark">Lain-Lain (Ban bocor, dll)</label>
          <div class="input-group mb-2">
            <span class="input-group-text bg-light">Rp</span>
            <input type="number" id="input-lain" class="form-control" value="${lainVal || ""}" placeholder="0">
          </div>
        </div>
      `,
      showCancelButton: true,
      confirmButtonText: '<i class="fa-solid fa-save me-1"></i> Simpan Data',
      cancelButtonText: "Batal",
      focusConfirm: false,
      customClass: { confirmButton: "btn btn-primary-saas px-4", cancelButton: "btn btn-light border px-4" },
      preConfirm: () => {
        // Validasi: Cegah user menyimpan jika KM Akhir kosong
        const kmAkhirInput = document.getElementById("input-km-akhir").value;
        if (!kmAkhirInput) {
          Swal.showValidationMessage("KM Akhir wajib diisi!");
          return false;
        }

        return {
          kmAkhir: kmAkhirInput, // Mengirim KM Akhir ke Backend
          bbm: document.getElementById("input-bbm").value || 0,
          tol: document.getElementById("input-tol").value || 0,
          parkir: document.getElementById("input-parkir").value || 0,
          lain: document.getElementById("input-lain").value || 0,
        };
      },
    }).then((result) => {
      if (result.isConfirmed) {
        Swal.fire({ title: "Menyimpan...", allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        google.script.run
          .withSuccessHandler(function (res) {
            if (res.success) {
              Swal.fire("Sukses!", res.pesan, "success");
              loadRiwayatKendaraanUser(); // Refresh tabel agar KM Akhir yang baru diinput langsung muncul
            } else {
              Swal.fire("Gagal", res.pesan, "error");
            }
          })
          .simpanPengeluaranKendaraan(idIzin, result.value); // Mengirim data ke file 09_Izin_Kendaraan.gs
      }
    });
  }

  function loadAdminKaryawan() {

  function loadRiwayat() {
    document.getElementById("tableRiwayatBody").innerHTML = '<tr><td colspan="8" class="text-center py-4"><i class="fa-solid fa-spinner fa-spin fa-2x text-primary"></i></td></tr>';
    google.script.run

        if (data.length === 0) {
          html = '<tr><td colspan="8" class="text-center text-muted py-4">Belum ada riwayat perjalanan.</td></tr>';

          data.forEach((row) => {
            let badge = row.status === "OUT" ? `<span class="badge bg-warning text-dark">OUT</span>` : `<span class="badge bg-success">IN</span>`;
            let valBadge = "";
            if (row.validasi === "APPROVED") valBadge = `<span class="badge bg-success"><i class="fa-solid fa-check-double"></i> Approved</span>`;
            else if (row.validasi === "ADJUSTED") valBadge = `<span class="badge bg-info text-dark"><i class="fa-solid fa-pen-clip"></i> Penyesuaian</span>`;
            else if (row.validasi === "PENDING" && row.status === "IN") valBadge = `<span class="badge bg-secondary"><i class="fa-solid fa-hourglass-half"></i> Pending</span>`;
            else valBadge = `<span class="text-muted">-</span>`;
            html += `<tr><td>${badge}</td><td>${valBadge}</td><td><strong class="text-dark">${row.st}</strong></td><td>${row.tgl_keluar}</td><td>${row.tgl_masuk}</td><td class="text-start">${row.customer}</td><td>${row.durasi}</td><td><strong class="text-success">${row.upd}</strong></td></tr>`;
          });
        }
        document.getElementById("tableRiwayatBody").innerHTML = html;
      })
      .getRiwayatUser(currentUser.nrpp);

  function cekLokasiGPS(tipe) {
    if (tipe === "KELUAR") {
      const st = document.getElementById("inputST").value;
      const kend = document.getElementById("selectKendaraan").value;
      const cust = document.getElementById("inputCustomer").value;
      const lok = document.getElementById("inputLokasi").value;
      if (!st || !kend || !cust || !lok) return Swal.fire("Data Belum Lengkap", "Lengkapi ST, Kendaraan, Customer, & Lokasi.", "warning");
      currentUser.st = st;
      currentUser.kendaraan = kend;
      currentUser.customer = cust;
      currentUser.lokasi = lok;
    }
    globalTipeScan = tipe;
    currentUser.tipe_scan = tipe;
    Swal.fire({ title: "Memeriksa Kordinat...", text: "Mengambil data satelit GPS...", allowOutsideClick: false, didOpen: () => Swal.showLoading() });
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        function (pos) {
          google.script.run
            .withSuccessHandler(function (resLokasi) {
              if (resLokasi.valid) {
                Swal.close();
                bukaPilihanKamera();
              } else {
                Swal.fire("Area Diluar Jangkauan!", resLokasi.pesan, "error");
              }
            })
            .validasiLokasi(pos.coords.latitude, pos.coords.longitude, currentUser.nrpp);
        },
        function (err) {
          Swal.fire("Akses GPS Ditolak", "Aplikasi membutuhkan izin lokasi GPS.", "error");
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 },
      );
    } else {
      Swal.fire("Error", "Browser tidak mendukung GPS.", "error");
    }
  }

  function resetScannerUI() {
    document.getElementById("fileScan").value = "";
    document.getElementById("reader").innerHTML = '<i class="fa-solid fa-camera fa-3x text-primary opacity-50 mb-2"></i><span class="text-dark fw-bold">Area Pemindai Barcode</span>';
    if (html5QrCode) {
      try {
        html5QrCode.clear();
      } catch (e) {}
    }
  }

  function bukaPilihanKamera() {
    resetScannerUI();
    document.getElementById("pageDashboard").style.display = "none";
    document.getElementById("sectionScanner").style.display = "block";
  }

  function batalScan() {
    resetScannerUI();
    document.getElementById("sectionScanner").style.display = "none";
    document.getElementById("pageDashboard").style.display = "block";
  }

  function prosesFotoBarcode(event) {
    if (event.target.files.length == 0) return;
    const file = event.target.files[0];
    if (!html5QrCode) {
      html5QrCode = new Html5Qrcode("reader");
    }
    Swal.fire({ title: "Menganalisa Barcode...", text: "Membaca gambar...", allowOutsideClick: false, didOpen: () => Swal.showLoading() });
    html5QrCode
      .scanFile(file, true)
      .then((decodedText) => {
        Swal.close();
        onScanSuccess(decodedText);
      })
      .catch((err) => {
        Swal.fire("Gagal Membaca", "Barcode tidak ditemukan. Pastikan foto terang dan jelas.", "error");
        resetScannerUI();
      });
  }

  function onScanSuccess(decodedText) {
    resetScannerUI();
    document.getElementById("sectionScanner").style.display = "none";
    currentUser.qr_text = decodedText;
    Swal.fire({ title: "Menyimpan Data...", text: "Mengirim ke Server...", allowOutsideClick: false, didOpen: () => Swal.showLoading() });
    google.script.run
      .withSuccessHandler(function (res) {
        if (res.success) {
          Swal.fire({ title: "Berhasil!", html: res.pesan, icon: "success" }).then(() => {
            currentUser.status_trip = globalTipeScan === "KELUAR" ? "OUT" : "STANDBY";
            setupDashboard();
            document.getElementById("pageDashboard").style.display = "block";
          });
        } else {
          Swal.fire("Ditolak!", res.pesan, "error").then(() => {
            batalScan();
          });
        }
      })
      .prosesDataScan(currentUser);
  }

  function nyalakanRadarNotifikasiHRD() {
    if (intervalRadarHRD) clearInterval(intervalRadarHRD);

    intervalRadarHRD = setInterval(() => {
      google.script.run
        .withSuccessHandler((res) => {
          if (globalStateRadar === "") {
            globalStateRadar = res.newState;
            return;
          }

          if (res && res.hasChanged) {
            globalStateRadar = res.newState;

            let audio = new Audio("https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3");
            audio.play().catch((e) => console.log("Auto-play ditahan browser"));

            Swal.fire({
              toast: true,
              position: "top-end",
              icon: "info",
              title: "Update Pos: Ada yang Keluar / Kembali!",
              showConfirmButton: false,
              timer: 4000,
            });

            document.getElementById("admTotalOut").innerHTML = `${res.data.totalOut} <span class="fs-6 text-muted fw-normal">Personil</span>`;
            document.getElementById("admTotalUPD").innerText = "Rp " + (res.data.totalUPDBulanIni || 0).toLocaleString("id-ID");

            // --- TAMBAHAN BARU: Update Badge Personil Dinas secara Real-Time ---
            const badgeDinas = document.getElementById("badge-dinas-count");
            if (badgeDinas) {
              badgeDinas.style.display = res.data.totalOut > 0 ? "inline-block" : "none";
              badgeDinas.innerText = res.data.totalOut;
            }
            // -------------------------------------------------------------------

            renderTabelAdminOut(res.data.aktifOut);

            // Update juga badge approval jika ada yang kembali masuk
            if (typeof loadPendingApprovals === "function") {
              loadPendingApprovals(true);

        })
        .cekNotifikasiAbsenBaruHRD(globalStateRadar);

    Swal.fire({
      title: "Approve Perjalanan?",
      text: "Data ini akan disahkan dan masuk ke dalam perhitungan pencairan UPD bulan ini.",
      icon: "question",
      showCancelButton: true,
      confirmButtonColor: "#10b981",
      cancelButtonColor: "#64748b",
      confirmButtonText: "Ya, Approve!",
    }).then((result) => {
      if (result.isConfirmed) {
        Swal.fire({ title: "Memproses...", allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        google.script.run
          .withSuccessHandler(function (res) {
            if (res.success) {
              Swal.fire("Sukses!", res.pesan, "success");

              // --- TAMBAHAN BARU: REAL-TIME REFRESH TRIGGER ---

              // 1. Refresh tabel antrean "Butuh Approval" dan update angka ikon Badge
              if (typeof loadPendingApprovals === "function") {
                loadPendingApprovals(true);
              }

              // 2. Refresh tabel "Rekap Karyawan" (jika HRD sedang membukanya)
              if (document.getElementById("adminSelectKaryawan") && document.getElementById("adminSelectKaryawan").value) {
                lihatRekapKaryawanAdmin();

              // 3. Refresh metrik total UPD di dashboard utama secara diam-diam

                refreshDashboardHRDBackground();

              // ------------------------------------------------
            } else {
              Swal.fire("Gagal", res.pesan, "error");
            }
          })
          .approveLogAdmin(idTransaksi);
      }
    });
  }

  function lihatArsipKaryawanAdmin() {
    let nrpp = document.getElementById("adminSelectKaryawanArsip").value;
    if (!nrpp) return Swal.fire("Oops", "Pilih karyawan terlebih dahulu", "warning");

    document.getElementById("adminRekapArsipContainer").innerHTML =
      '<div class="text-center py-5"><i class="fa-solid fa-spinner fa-spin fa-2x text-primary mb-3"></i><br><span class="fw-bold text-muted">Membongkar Brankas Arsip...</span></div>';

    google.script.run
      .withSuccessHandler(function (res) {
        let html = "";
        const kunciBulan = Object.keys(res.arsipUPD);

        // 1. Jika Arsip Kosong
        if (kunciBulan.length === 0) {
          html =
            '<div class="alert bg-light border text-center text-muted py-5 shadow-sm" style="border-radius: var(--radius-card);"><i class="fa-solid fa-folder-open fa-2x mb-2 text-dark opacity-50"></i><br>Belum ada data arsip perjalanan untuk karyawan ini.</div>';
        }
        // 2. Jika Arsip Ada, Render Berdasarkan Bulan
        else {
          kunciBulan.forEach((monthYear) => {
            let parts = monthYear.split("-");
            let namaBulan = getNamaBulan(parts[1]);

            html += `<div class="card card-form border-0 mb-4 shadow-sm border-warning" style="border-top: 4px solid #f59e0b !important;">
              <div class="card-header bg-white text-dark fw-bold border-bottom py-3">
                 <i class="fa-solid fa-box-archive text-warning me-2"></i> ARSIP: ${namaBulan.toUpperCase()} ${parts[0]}
              </div>
              <div class="card-body p-3">`;

            // --- TABEL LOG PERJALANAN (BULAN TERSEBUT) ---
            html += `<div class="d-flex justify-content-between align-items-center mb-2">
                       <h6 class="text-dark fw-bold mb-0" style="font-size: 0.9rem;"><i class="fa-solid fa-list-ul text-secondary me-1"></i> Rincian Log Perjalanan</h6>
                       <button class="btn btn-sm btn-dark fw-bold shadow-sm" onclick="cetakLogHRD('${nrpp}', '${monthYear}')"><i class="fa-solid fa-print me-1"></i> Cetak Log</button>
                     </div>
                     <div class="table-responsive shadow-sm mb-4" style="border-radius: var(--radius-input); border: 1px solid var(--card-border);">
                      <table class="table table-sm table-hover align-middle mb-0 text-center" style="font-size: 0.8rem;">
                        <thead class="table-light">
                          <tr><th>ST</th><th>Waktu Keluar</th><th>Waktu Masuk</th><th>Customer</th><th>Durasi</th><th>UPD</th></tr>
                        </thead>
                        <tbody>`;

            let logData = res.arsipLog[monthYear];
            if (!logData || logData.length === 0) {
              html += `<tr><td colspan="6" class="text-center py-3 text-muted">Tidak ada rincian log.</td></tr>`;
            } else {
              logData.forEach((row) => {
                html += `<tr>
                          <td><span class="badge bg-light text-dark border">${row.st}</span></td>
                          <td>${row.tgl_keluar}</td>
                          <td>${row.tgl_masuk}</td>
                          <td class="text-start text-truncate" style="max-width: 150px;" title="${row.customer}">${row.customer}</td>
                          <td>${row.durasi}</td>
                          <td class="text-success fw-bold">${row.upd}</td>
                         </tr>`;
              });
            }
            html += `</tbody></table></div>`;

            // --- LIST PENDAPATAN UPD & TOMBOL CETAK PDF ---
            html += `<h6 class="text-dark fw-bold mb-2" style="font-size: 0.9rem;"><i class="fa-solid fa-file-invoice-dollar text-success me-1"></i> Rekap Pendapatan UPD</h6>
                     <div class="list-group shadow-sm" style="border-radius: var(--radius-input);">`;

            let stData = res.arsipUPD[monthYear];
            for (let st in stData) {
              html += `<div class="list-group-item d-flex justify-content-between align-items-center border-0 border-bottom bg-light py-2">
                        <div><strong class="text-dark">${st}</strong><br><small class="text-muted">Total: <span class="fw-bold text-success">Rp ${stData[st].total.toLocaleString("id-ID")}</span></small></div>
                        <button class="btn btn-sm btn-primary px-3 shadow-sm" style="border-radius: 8px;" onclick="cetakLaporanPDF('${st}', '${nrpp}')"><i class="fa-solid fa-file-pdf"></i></button>
                       </div>`;
            }
            html += `</div>`;
            html += `</div></div>`; // Penutup Card Bulan
          });
        }

        // Render semua html yang sudah dirakit ke kontainer
        document.getElementById("adminRekapArsipContainer").innerHTML = html;
      })
      .getArsipKaryawanLengkap(nrpp);
  }

  // ===================================================================================
  // LOGIKA NAVIGASI SUB-MENU CARDS HRD & RENDER DATA PENDING
  // ===================================================================================

  function pindahTabHRD(tabName) {
    // 1. Sembunyikan semua konten tab
    const tabs = ["dinas", "approval", "rekap", "tarif"];
    tabs.forEach((t) => {
      document.getElementById(`tab-hrd-${t}`).style.display = "none";
      document.getElementById(`card-hrd-${t}`).classList.remove("border-primary", "border-warning", "border-success", "border-info");
    });

    // 2. Tampilkan tab yang dipilih dan beri warna border pada Card-nya
    document.getElementById(`tab-hrd-${tabName}`).style.display = "block";

    if (tabName === "dinas") {
      document.getElementById(`card-hrd-dinas`).classList.add("border-primary");
    } else if (tabName === "approval") {
      document.getElementById(`card-hrd-approval`).classList.add("border-warning");
      loadPendingApprovals(); // Tarik data saat tab dibuka
    } else if (tabName === "rekap") {
      document.getElementById(`card-hrd-rekap`).classList.add("border-success");
    } else if (tabName === "tarif") {
      document.getElementById(`card-hrd-tarif`).classList.add("border-info");
    }
  }

  // ===================================================================================
  // PERBAIKAN FUNGSI: RENDER DATA APPROVAL & UPDATE ICON BADGE
  // ===================================================================================
  function loadPendingApprovals(silent = false) {
    const tbody = document.getElementById("tableAdminPendingApproval");

    // Jika user mengklik Tab (bukan radar background), tampilkan efek loading
    if (!silent && tbody) {
      tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4"><i class="fa-solid fa-spinner fa-spin text-warning fa-2x"></i><br>Mencari antrean...</td></tr>';
    }

    google.script.run
      .withSuccessHandler(function (res) {
        globalPendingApprovalData = res;
        // 1. UPDATE ICON BADGE (TOTAL BUTUH APPROVE) SECARA REAL-TIME
        const badge = document.getElementById("badge-approval-count");
        if (badge) {
          if (res.length > 0) {
            badge.style.display = "inline-block";
            badge.innerText = res.length; // Masukkan total angka
          } else {
            badge.style.display = "none"; // Sembunyikan ikon jika 0
          }
        }

        // Jika fungsi dipanggil hanya untuk update angka Badge, hentikan proses di sini
        if (silent) return;

        // 2. RENDER TABEL MENGGUNAKAN DOM MURNI
        if (tbody) tbody.innerHTML = "";

        if (res.length === 0) {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td colspan="4" class="text-center py-4 text-muted"><i class="fa-solid fa-mug-hot fa-2x mb-2 text-success"></i><br>Kerja bagus! Tidak ada antrean approval saat ini.</td>`;
          if (tbody) tbody.appendChild(tr);
          return;
        }

        res.forEach((item) => {
          const tr = document.createElement("tr");

          const tdNama = document.createElement("td");
          tdNama.innerHTML = `<strong class="text-dark">${item.nama}</strong>`;
          tr.appendChild(tdNama);

          const tdInfo = document.createElement("td");
          tdInfo.className = "text-start";
          tdInfo.innerHTML = `<span class="badge bg-light text-dark border">${item.st}</span><br><small class="text-muted text-truncate d-inline-block" style="max-width: 150px;">${item.lokasi}</small>`;
          tr.appendChild(tdInfo);

          const tdWaktu = document.createElement("td");
          tdWaktu.innerHTML = `<small class="fw-bold text-danger">${item.waktuKeluar}</small><br><small class="fw-bold text-success">${item.waktuMasuk}</small>`;
          tr.appendChild(tdWaktu);

          const tdAksi = document.createElement("td");
          tdAksi.innerHTML = `
            <button class="btn btn-sm btn-light border text-primary shadow-sm me-1" onclick="bukaModalKoreksiLogHRD('${item.id}')" title="Koreksi"><i class="fa-solid fa-pen"></i></button>
            <button class="btn btn-sm btn-success shadow-sm" onclick="aksiApproveLogHRD('${item.id}'); setTimeout(loadPendingApprovals, 2000);" title="Approve"><i class="fa-solid fa-check"></i></button>
          `;
          tr.appendChild(tdAksi);

          if (tbody) tbody.appendChild(tr);
        });
      })
      .getPendingApprovalHRD();
  }

  // ===================================================================================
  // FUNGSI PRINT KHUSUS HRD (MENCETAK DATA KARYAWAN LAIN)
  // ===================================================================================
  function cetakLogHRD(nrppTarget, periodKey) {
    Swal.fire({
      title: "Menyiapkan Dokumen...",
      text: "Sedang membuat PDF dari Server",
      allowOutsideClick: false,
      didOpen: () => Swal.showLoading(),
    });

    google.script.run
      .withSuccessHandler(function (res) {
        if (res.success) {
          Swal.close();

          // --- LOGIKA NAMA FILE DINAMIS ---
          let bulan = periodKey;
          if (bulan === "CURRENT") {
            let d = new Date();
            bulan = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
          }
          // Format: LOG_HRD-YYYY-MM-NRPP.pdf
          let namaFile = `LOG_HRD-${bulan}-${nrppTarget}.pdf`;

          const linkSource = "data:application/pdf;base64," + res.base64;
          const downloadLink = document.createElement("a");
          downloadLink.href = linkSource;
          downloadLink.download = namaFile;
          downloadLink.click();
        } else {
          Swal.fire("Gagal Cetak", res.pesan, "error");
        }
      })
      .generateLogPDFBase64(nrppTarget, "ALL", periodKey);
  }

  // ===================================================================================
  // MASTER FUNGSI DOWNLOAD PDF (MENGEMBALIKAN MODAL PILIHAN ST + FORCE DOWNLOAD)
  // ===================================================================================

  // 1. MODAL CETAK HRD (Bisa pilih ST atau ALL)
  function cetakLogHRD(nrppTarget, periodKey) {
    let uniqueST = [];
    if (periodKey === "CURRENT" && typeof globalAdminLogData !== "undefined") {
      uniqueST = [...new Set(globalAdminLogData.map((item) => item.st))];
    }

    let optionsHtml = '<option value="ALL">Semua Nomor ST (ALL)</option>';
    uniqueST.forEach((st) => {
      if (st && st !== "TANPA-ST" && st !== "") {
        optionsHtml += `<option value="${st}">${st}</option>`;
      }
    });

    Swal.fire({
      title: "Download Log HRD",
      html: `
        <div class="text-start mt-3">
          <label class="form-label small fw-bold mb-1 text-dark">Pilih Filter Cetak:</label>
          <select id="swal-select-st-hrd" class="form-select border-primary shadow-sm" style="border-radius: var(--radius-input);">
            ${optionsHtml}
          </select>
        </div>
      `,
      icon: "info",
      showCancelButton: true,
      confirmButtonText: '<i class="fa-solid fa-download me-1"></i> Download PDF',
      cancelButtonText: "Batal",
      preConfirm: () => {
        return document.getElementById("swal-select-st-hrd").value;
      },
    }).then((result) => {
      if (result.isConfirmed) {
        eksekusiDownloadLog(nrppTarget, result.value, periodKey, "HRD");
      }
    });
  }

  // 4. MESIN DOWNLOADER LOG PERJALANAN (Otomatis Penamaan File)
  function eksekusiDownloadLog(nrppTarget, st, periodKey, role) {
    Swal.fire({ title: "Menyiapkan Dokumen...", text: "Sedang menarik data dari server...", allowOutsideClick: false, didOpen: () => Swal.showLoading() });

    google.script.run
      .withSuccessHandler(function (res) {
        if (res.success) {
          Swal.close();
          let bulan = periodKey;
          if (bulan === "CURRENT") {
            let d = new Date();
            bulan = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
          }
          let safeST = st === "ALL" ? "ALL" : st.replace(/[^a-zA-Z0-9]/g, "_");
          let namaFile = `LOG_${role}_${bulan}_${safeST}.pdf`;

          const linkSource = "data:application/pdf;base64," + res.base64;
          const downloadLink = document.createElement("a");
          downloadLink.href = linkSource;
          downloadLink.download = namaFile;
          downloadLink.click();
        } else {
          Swal.fire("Gagal Download", res.pesan, "error");
        }
      })
      .generateLogPDFBase64(nrppTarget, st, periodKey);
  }

  // 5. MESIN DOWNLOADER LAPORAN UPD (Langsung Download Per ST)
  function cetakLaporanPDF(st, nrpp) {
    if (!nrpp) nrpp = currentUser.nrpp;

    Swal.fire({ title: "Menyiapkan Dokumen...", text: "Membuat PDF Laporan UPD...", allowOutsideClick: false, didOpen: () => Swal.showLoading() });

    google.script.run
      .withSuccessHandler(function (res) {
        if (res.success) {
          Swal.close();
          let d = new Date();
          let bulan = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
          let safeST = st.replace(/[^a-zA-Z0-9]/g, "_");
          let namaFile = `LAPORAN_UPD_${bulan}_${safeST}.pdf`;

          const linkSource = "data:application/pdf;base64," + res.base64;
          const downloadLink = document.createElement("a");
          downloadLink.href = linkSource;
          downloadLink.download = namaFile;
          downloadLink.click();
        } else {
          Swal.fire("Gagal Download", res.pesan, "error");
        }
      })
      .generatePDFBase64(nrpp, st);
  }
